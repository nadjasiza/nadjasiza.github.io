<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eunbyeol Song | Index</title>
    <style>
        /* 기본 폰트 및 배경 설정 */
        body { 
            font-family: "Helvetica", Arial, sans-serif; 
            font-size: 13px; 
            line-height: 1.4; 
            color: #1a1a1a; 
            background-color: #fcfcfc; 
            margin: 0; 
            padding: 60px 50px; 
            letter-spacing: -0.01em;
        }

        /* 좌측 사이드 정보 (About/Mail) */
        .sidebar { 
            position: fixed; 
            left: 50px; 
            top: 60px; 
            width: 100px; 
        }
        .sidebar div { margin-bottom: 2px; }
        .sidebar a { text-decoration: none; color: inherit; border-bottom: 1px solid #ccc; }

        /* 메인 그리드 설정: 구분선 없이 간격으로만 조정 */
        .container { 
            display: grid; 
            grid-template-columns: 120px 180px 180px 180px; 
            gap: 40px; 
            margin-left: 200px; /* 사이드바 공간 확보 */
        }

        /* 타이틀 스타일: 볼드체, 줄바꿈 적용 */
        .column-title { 
            font-weight: bold; 
            margin-bottom: 50px; 
            text-transform: uppercase;
            line-height: 1.2;
        }

        /* 아이템 스타일: 숫자와 제목 배치 */
        .item { 
            margin-bottom: 30px; 
        }
        .item-num { 
            display: block; 
            font-weight: bold; 
            margin-bottom: 3px; 
        }
        .item-name { 
            display: block; 
            margin-bottom: 1px;
        }
        .item-link {
            text-decoration: none;
            color: inherit;
        }
        .item-link:hover {
            opacity: 0.6;
        }

        /* 모바일 대응 */
        @media (max-width: 800px) {
            .sidebar { position: static; margin-bottom: 60px; }
            .container { margin-left: 0; grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div><strong>Eunbyeol Song</strong></div>
        <div><a href="mailto:your-email@example.com">Mail</a></div>
        <div><a href="https://github.com/nadjasiza">GitHub</a></div>
    </div>

    <div class="container">
        
        <div class="column">
            <div class="column-title">I<br>Project<br>Context</div>
            
            <div class="item">
                <span class="item-num">1</span>
                <span class="item-name">지역 자산 기록화 사업</span>
            </div>
            
            <div class="item">
                <span class="item-num">2</span>
                <span class="item-name">ICT 플랫폼 런칭 및 PMO</span>
            </div>
        </div>

        <div class="column">
            <div class="column-title">II<br>Project<br>Archive</div>
            
            <div class="item">
                <span class="item-num">3</span>
                <span class="item-name">마을기업 협동조합 운영</span>
            </div>
            
            <div class="item">
                <span class="item-num">4</span>
                <span class="item-name">EBS ICT 교육 모델 개발</span>
            </div>

            <div class="item">
                <span class="item-num">5</span>
                <span class="item-name">로컬 영화관 구축 프로젝트</span>
            </div>
        </div>

        <div class="column">
            <div class="column-title">III<br>Article</div>
            
            <div class="item">
                <span class="item-num">6</span>
                <a href="#" class="item-link"><span class="item-name">도시의 이끼 관찰기</span></a>
            </div>
            
            <div class="item">
                <span class="item-num">7</span>
                <a href="#" class="item-link"><span class="item-name">건축인류학적 시선</span></a>
            </div>
            
            <div class="item">
                <span class="item-num">8</span>
                <a href="#" class="item-link"><span class="item-name">비즈니스 선순환 구조</span></a>
            </div>
        </div>

    </div>

</body>
</html>
