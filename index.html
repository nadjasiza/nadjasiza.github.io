<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eunbyeol SONG | Portfolio Index</title>
    <style>
        /* [기존 스타일 유지] */
        * { box-sizing: border-box; }
        body { 
            font-family: "Helvetica", Arial, sans-serif; 
            font-size: 12px; line-height: 1.4; color: #1a1a1a; 
            background-color: #f9f9f9; 
            margin: 0; padding: 0; 
            word-break: keep-all; scroll-behavior: smooth;
        }
        .main-index, .main-visual-container, footer { 
            padding: 0 50px 10px 50px;
            display: grid; 
            grid-template-columns: repeat(6, 1fr); 
            gap: 20px; 
        }
        .main-index, footer { background-color: #f9f9f9; }
        .sidebar { grid-column: 1; padding-top: 175px; }
        .sidebar-name, .footer-sidebar .sidebar-name { font-weight: bold; display: block; margin-bottom: 13px; text-transform: uppercase; }
        .sidebar-links div { margin-bottom: 3px; }
        .sidebar a, footer a { text-decoration: none; color: inherit; border-bottom: 1px solid #ccc; }
        .column-context { grid-column: 3; }
        .column-archive-1 { grid-column: 4; }
        .column-archive-2 { grid-column: 5; }
        .column-article { grid-column: 6; }
        .column-title { font-weight: bold; margin-top: 30px; margin-bottom: 100px; text-transform: uppercase; line-height: 1.2; height: 35px; }
        .item { margin-bottom: 60px; }
        .item-num { display: block; font-weight: bold; margin-bottom: 5px; }
        .item-name { display: block; margin-bottom: 3px; }
        .item-year, .txt-gray { color: #888; }
        .item-year { display: block; font-size: 12px; margin-top: 10px; }
        .main-visual-container { background-color: #ffffff; padding: 120px 50px; align-items: start; }
        .visual-title { grid-column: 1; }
        .visual-title h3 { font-size: 13px; font-weight: bold; line-height: 1.5; margin: 0; }
        .visual-detail { grid-column: 2 / span 2; padding-right: 20px; }
        .detail-section { margin-bottom: 30px; }
        .detail-section h4 { font-size: 12px; font-weight: bold; margin-bottom: 10px; }
        .detail-section ul { list-style: none; padding: 0; margin: 0; }
        .detail-section li { margin-bottom: 8px; position: relative; padding-left: 12px; }
        .detail-section li::before { content: "•"; position: absolute; left: 0; color: #888; }

        /* 이미지 영역 */
        .visual-image-area { grid-column: 4 / span 3; }
        .visual-image-area img { width: 100%; height: auto; display: block; }

        footer { padding: 100px 50px; margin-top: 150px; align-items: start; }
        .footer-sidebar { grid-column: 1; padding-top: 15px; }
        .footer-exp { grid-column: 2 / span 2; }
        .footer-desc-area { grid-column: 4 / span 3; }
        .footer-col h3 { font-size: 13px; font-weight: bold; margin-bottom: 25px; text-transform: uppercase; }
        .exp-text { line-height: 1.6; color: #1a1a1a; margin: 0; }
        .exp-item { margin-bottom: 15px; display: block; }
        .exp-item span { display: block; }
        .desc-text { line-height: 1.6; color: #1a1a1a; margin-bottom: 15px; }
        .footer-bottom { grid-column: 1 / -1; display: flex; justify-content: flex-end; padding-top: 80px; }

        @media (max-width: 1400px) {
            .main-index, .main-visual-container, footer { grid-template-columns: 1fr 1fr; }
            .visual-image-area { grid-column: 1 / span 2; margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div class="main-index" id="top">
        </div>

    <div class="main-visual-container">
        <div class="visual-title">
            <h3>
                B2G·B2B 전략 수주 및 RFP 기반 비즈니스 모델 설계<br>
                <span class="txt-gray">Strategic B2G·B2B Acquisition & RFP Response</span>
            </h3>
        </div>
        <div class="visual-detail">
            <div class="detail-section">
                <h4>◼︎ 시작 배경과 목표</h4>
                <ul><li>에듀테크 플랫폼 '위캔버스'의 공교육 현장 안착을 위한 수주 전략 수립</li></ul>
                </div>
        </div>

        <div class="visual-image-area">
            <img src="https://raw.githubusercontent.com/nadjasiza/nadjasiza.github.io/main/Assets/1-%EA%B5%AD%EB%A6%BD%EC%83%9D%ED%83%9C%EC%9B%90.png" alt="프로젝트 이미지">
        </div>
    </div>

    <footer id="footer-anchor">
        </footer>

</body>
</html>
